# This file was created automatically with `jupyter-book init --gh-pages` 🪄 💚
# Ensure your GitHub Pages settings for this repository are set to deploy with **GitHub Actions**.

name: Jupyter Book (via myst) GitHub Pages Deploy
on:
  push:
    # Runs on pushes targeting the default branch
    branches: [main]
env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  # If, instead, your site lives at the root of the domain, at `https://mydomain.org`, set `BASE_URL=''`.
  BASE_URL: /${{ github.event.repository.name }}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install LaTeX Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-xetex
      - name: Install Jupyter Book (via myst)
        run: npm install -g jupyter-book
      - name: Build PDF Assets
        run: jupyter-book build --pdf
      - name: Build HTML Assets
        run: jupyter-book build --html
      - name: Build Jupyter Notebook Slides
        run: |
          mkdir -p _build/datapy-slides _build/figures
          python -m pip install --upgrade pip nbconvert
          find . -maxdepth 2 -name '*.ipynb' -print0 | xargs -0 -I{} python -m nbconvert --to slides --output-dir _build/datapy-slides {}
          if [ -d figures ]; then cp -R figures/. _build/figures/; fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'
      - name: Upload slides artifact
        uses: actions/upload-artifact@v4
        with:
          name: revealjs-slides
          path: |
            ./_build/datapy-slides
            ./_build/figures
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Build Jupyter Notebook Slides
        run: |
          python -m pip install --upgrade pip nbconvert
          mkdir -p _build/datapy-slides _build/figures
          find . -maxdepth 2 -name '*.ipynb' -print0 | xargs -0 -I{} python -m nbconvert --to slides --output-dir _build/datapy-slides {}
          if [ -d figures ]; then cp -R figures/. _build/figures/; fi
          cd _build
          if [ -d figures ]; then
            zip -r revealjs-slides.zip datapy-slides figures >/dev/null
          else
            zip -r revealjs-slides.zip datapy-slides >/dev/null
          fi
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: _build/revealjs-slides.zip
